<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Vendor Digitalization Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="container navbar">
            <h1 class="logo">VendorPortal</h1>
            <nav>
                <a href="#customer-section" class="nav-link">Order</a>
                <button id="navAdminBtn" class="btn btn-outline" style="margin-right: 15px; display: none;"
                    onclick="promptAdminLogin()">Admin Login</button>
                <button id="navVendorBtn" class="btn btn-outline" onclick="toggleAuthModal()">Vendor Login</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="hero" class="hero">
            <h2>Support Your Local Vendors</h2>
            <p>Order fresh products directly from local stores.</p>
        </section>

        <!-- Customer Actions Form -->
        <section id="customer-section" class="customer-order box-shadow fade-in"
            style="max-width: 800px; margin: 0 auto; padding: 2rem; border-radius: 12px; background: rgba(30,30,36, 0.7); backdrop-filter: blur(10px);">
            <div class="tab-buttons" style="margin-bottom: 2rem;">
                <button class="tab-btn active" onclick="switchCustomerTab('place')" id="ctab-place">Place Order</button>
                <button class="tab-btn" onclick="switchCustomerTab('track')" id="ctab-track">Track My Orders</button>
            </div>

            <!-- Place Order View -->
            <div id="customerPlaceView">
                <form id="orderForm">
                    <div class="form-group">
                        <label for="vendorSelect">Select Local Vendor</label>
                        <select id="vendorSelect" required>
                            <option value="" disabled selected>Loading vendors...</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cName">Your Name</label>
                            <input type="text" id="cName" placeholder="E.g. Rahul Sharma" required />
                        </div>
                        <div class="form-group">
                            <label for="cPhone">Your Phone Number</label>
                            <input type="tel" id="cPhone" placeholder="E.g. 9876543210" required />
                        </div>
                    </div>

                    <div class="form-group" style="display: flex; gap: 1rem; align-items: flex-start;">
                        <div style="flex: 1;">
                            <label for="productSelect">Available Products</label>
                            <select id="productSelect" required disabled>
                                <option value="" disabled selected>Select a vendor first...</option>
                            </select>
                        </div>
                        <div id="productImagePreviewContainer"
                            style="display: none; width: 80px; height: 80px; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);">
                            <img id="productImagePreview" src="" alt="Product Preview"
                                style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantity">Quantity</label>
                            <input type="number" id="quantity" value="1" min="1" required />
                        </div>
                        <div class="form-group">
                            <label for="amount">Total Amount (₹)</label>
                            <input type="number" id="amount" placeholder="0" min="0" required readonly
                                style="background: rgba(0,0,0,0.4);" />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary full-width" id="placeOrderBtn">
                        Place Order
                    </button>
                    <div id="orderMessage" class="message"></div>
                </form>
            </div>

            <!-- Track Order View -->
            <div id="customerTrackView" style="display: none;">
                <form id="trackForm" style="display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 2rem;">
                    <div class="form-group" style="flex: 1; margin: 0;">
                        <label for="trackPhone">Enter Your Phone Number</label>
                        <input type="tel" id="trackPhone" placeholder="+91..." required />
                    </div>
                    <button type="submit" class="btn btn-primary" id="trackOrderBtn">Track</button>
                </form>
                <div id="trackMessage" class="message"></div>

                <div class="table-container fade-in" id="trackResultsContainer" style="display: none;">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Vendor</th>
                                <th>Product</th>
                                <th>Total</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="trackOrdersBody">
                            <!-- Tracking results injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Auth Modal (Login / Register) -->
    <div id="authModal" class="modal">
        <div class="modal-content fade-in">
            <span class="close-btn" onclick="toggleAuthModal()">&times;</span>
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required />
                </div>
                <button type="submit" class="btn btn-primary full-width">Login</button>
                <div id="loginMessage" class="message"></div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required />
                </div>
                <div class="form-group">
                    <label>Store Name</label>
                    <input type="text" id="regStore" required />
                </div>
                <div class="form-group">
                    <label>Phone Number (with Country Code)</label>
                    <input type="tel" id="regPhone" placeholder="+919876543210" required />
                    <small>Required for WhatsApp/SMS notifications</small>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required />
                </div>
                <button type="submit" class="btn btn-primary full-width">Register Vendor</button>
                <div id="regMessage" class="message"></div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
